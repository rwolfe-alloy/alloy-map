<style>
  :root{
    --alloy:#e1251b;      /* Alloy red */
    --alloy-dk:#b71c14;
    --ink:#1d1d1f;
    --panel:#ffffff;
    --muted:#6b7280;
    --line:#e6e6e8;
    --bg:#f4f5f7;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #app{display:flex;height:100vh;overflow:hidden}

  /* Sidebar */
  #sidebar{width:360px;min-width:360px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%}
  .brand{padding:18px 20px 14px;border-bottom:1px solid var(--line)}
  .brand h1{margin:0;font-size:19px;letter-spacing:-.2px}
  .brand h1 b{color:var(--alloy)}
  .brand .sub{margin-top:3px;font-size:12.5px;color:var(--muted)}
  .controls{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px}
  .search{position:relative}
  .search input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:10px;font-size:14px;outline:none;transition:border-color .15s}
  .search input:focus{border-color:var(--alloy)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .row{display:flex;gap:8px;align-items:center}
  select{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;background:#fff;outline:none}
  .stat{font-size:12.5px;color:var(--muted);padding:0 20px;margin:10px 0 4px}
  .stat b{color:var(--ink)}
  #list{flex:1;overflow-y:auto;padding:4px 10px 16px}
  .card{padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin:6px 4px;cursor:pointer;transition:.12s;background:#fff}
  .card:hover{border-color:var(--alloy);box-shadow:0 2px 10px rgba(225,37,27,.08)}
  .card.active{border-color:var(--alloy);background:#fff5f4}
  .card .nm{font-weight:650;font-size:14px;display:flex;align-items:center;gap:7px}
  .pin{width:9px;height:9px;border-radius:50%;background:var(--alloy);flex:none}
  .card .ad{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.35}
  .card .meta{margin-top:7px;display:flex;gap:12px;font-size:12px}
  .card .meta a{color:var(--alloy);text-decoration:none;font-weight:600}
  .card .meta a:hover{text-decoration:underline}
  .empty{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px}

  /* Map */
  #map{flex:1;height:100%}
  .leaflet-popup-content{margin:12px 14px;font-size:13px;line-height:1.45}
  .leaflet-popup-content .pnm{font-weight:700;font-size:14px;margin-bottom:4px}
  .leaflet-popup-content .pad{color:var(--muted);margin-bottom:7px}
  .leaflet-popup-content a{color:var(--alloy);text-decoration:none;font-weight:600;margin-right:12px}
  .alloy-pin{background:var(--alloy);width:16px;height:16px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}

  .legend{position:absolute;z-index:500;bottom:18px;right:18px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12px;box-shadow:0 2px 12px rgba(0,0,0,.1)}
  .legend b{color:var(--alloy)}

  /* Mobile */
  .mtoggle{display:none}
  @media(max-width:760px){
    #app{flex-direction:column}
    #sidebar{width:100%;min-width:0;height:46%;border-right:none;border-bottom:1px solid var(--line)}
    #map{height:54%}
    .mtoggle{display:inline-block}
  }
</style>
</head>

const map = L.map('map', {scrollWheelZoom:true}).setView([39.5, -98.35], 4);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
  maxZoom:19, subdomains:'abcd'
}).addTo(map);

const icon = L.divIcon({className:'', html:'<div class="alloy-pin"></div>', iconSize:[16,16], iconAnchor:[8,15], popupAnchor:[0,-14]});
const cluster = L.markerClusterGroup({maxClusterRadius:45, spiderfyOnMaxZoom:true, showCoverageOnHover:false});
map.addLayer(cluster);

const listEl=document.getElementById('list');
const qEl=document.getElementById('q');
const stateSel=document.getElementById('stateSel');
const countEl=document.getElementById('count');
const filteredEl=document.getElementById('filtered');

document.getElementById('total2').textContent=LOCATIONS.length;

// build state dropdown
[...new Set(LOCATIONS.map(l=>l.s).filter(Boolean))].sort().forEach(s=>{
  const o=document.createElement('option');o.value=s;o.textContent=s;stateSel.appendChild(o);
});

const mapsLink = l => l.u && l.u.length>4 ? l.u : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(l.a)}`;
const dirLink  = l => `https://www.google.com/maps/dir/?api=1&destination=${l.lat},${l.lng}`;

// create markers once
LOCATIONS.forEach(l=>{
  l._marker = L.marker([l.lat,l.lng],{icon}).bindPopup(
    `<div class="pnm">${l.n}</div>`+
    `<div class="pad">${l.a}</div>`+
    (l.p?`<div style="margin-bottom:7px">📞 <a href="tel:${l.p}">${l.p}</a></div>`:'')+
    `<a href="${mapsLink(l)}" target="_blank" rel="noopener">Details ↗</a>`+
    `<a href="${dirLink(l)}" target="_blank" rel="noopener">Directions ↗</a>`
  );
});

let activeCard=null;
function render(items){
  cluster.clearLayers();
  items.forEach(l=>cluster.addLayer(l._marker));
  countEl.textContent=items.length;
  filteredEl.textContent = items.length===LOCATIONS.length ? '' : ` of ${LOCATIONS.length}`;

  listEl.innerHTML='';
  if(!items.length){ listEl.innerHTML='<div class="empty">No locations match your search.</div>'; return; }
  const sorted=[...items].sort((a,b)=> (a.s||'').localeCompare(b.s||'') || a.n.localeCompare(b.n));
  sorted.forEach(l=>{
    const c=document.createElement('div');c.className='card';
    c.innerHTML=`<div class="nm"><span class="pin"></span>${l.n}</div>`+
      `<div class="ad">${l.a}</div>`+
      `<div class="meta">`+
        (l.p?`<a href="tel:${l.p}">${l.p}</a>`:'')+
        `<a href="${dirLink(l)}" target="_blank" rel="noopener">Directions</a>`+
      `</div>`;
    c.addEventListener('click',e=>{
      if(e.target.tagName==='A') return;
      map.setView([l.lat,l.lng], 13, {animate:true});
      cluster.zoomToShowLayer(l._marker, ()=>l._marker.openPopup());
      if(activeCard)activeCard.classList.remove('active');
      c.classList.add('active');activeCard=c;
    });
    listEl.appendChild(c);
  });
}

function apply(){
  const q=qEl.value.trim().toLowerCase();
  const st=stateSel.value;
  const items=LOCATIONS.filter(l=>{
    if(st && l.s!==st) return false;
    if(q && !(`${l.n} ${l.a}`.toLowerCase().includes(q))) return false;
    return true;
  });
  render(items);
  if(st && items.length){
    const g=L.featureGroup(items.map(l=>l._marker));
    map.fitBounds(g.getBounds().pad(0.2));
  }
}
qEl.addEventListener('input', apply);
stateSel.addEventListener('change', apply);

render(LOCATIONS);
</script>
